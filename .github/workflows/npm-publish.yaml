name: Publish to npm

on:
  # Tag push: stable (v1.2.3) and semver prerelease (v1.2.3-beta.1)
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

  workflow_dispatch:


permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
        
      - name: Cd to mcp
        working-directory: ./mcp
        run: | 
          node -v
          npm -v
          node -e 'console.log(require("./package.json").version)'

      - name: Install dependencies
        working-directory: ./mcp
        run: npm ci

      - name: Build
        working-directory: ./mcp
        run: npm run build

      - name: Run tests
        working-directory: ./mcp
        run: npx vitest run

      - name: Resolve npm dist-tag
        id: npm_tag
        working-directory: ./mcp
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            SUFFIX="${GITHUB_REF#refs/tags/v}"
            if [[ "$SUFFIX" == *-* ]]; then
              DIST_TAG=beta
            else
              DIST_TAG=latest
            fi
          else
            VERSION=$(node -p "require('./package.json').version")
            if [[ "$VERSION" == *-* ]]; then
              DIST_TAG=beta
            else
              DIST_TAG=latest
            fi
          fi
          echo "tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Using npm dist-tag: $DIST_TAG"

      - name: Publish to npm
        working-directory: ./mcp
        run: NODE_AUTH_TOKEN="" npm publish --provenance --access public --tag "${{ steps.npm_tag.outputs.tag }}" --verbose
