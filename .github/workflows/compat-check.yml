name: Compat Check

on:
  pull_request:
    paths:
      - 'config/source/skills/**'
      - 'config/source/guideline/**'
      - 'config/source/editor-config/**'
      - 'scripts/build-compat-config.mjs'
      - 'scripts/diff-compat-config.mjs'
      - 'scripts/update-compat-baseline.mjs'
      - 'scripts/sync-config.mjs'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'config/source/skills/**'
      - 'config/source/guideline/**'
      - 'config/source/editor-config/**'
      - 'scripts/build-compat-config.mjs'
      - 'scripts/diff-compat-config.mjs'
      - 'scripts/update-compat-baseline.mjs'
      - 'scripts/sync-config.mjs'
      - 'package.json'

jobs:
  compat-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync mirrors and check for drift
        run: |
          # Sync mirrors first (generates files from config/source/)
          node scripts/sync-config.mjs
          # Check for diff (blocking)
          npm run check:compat-diff
          # If sync produced changes, fail the build with a clear message
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: config/source/ was modified but mirrors were not synced."
            echo "Run 'node scripts/sync-config.mjs' locally and commit the updated mirrors."
            exit 1
          fi
